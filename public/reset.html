<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Data - Coffee POS</title>
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6F4E37, #4A3428);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 {
            color: #6F4E37;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset {
            background: #e74c3c;
            color: white;
        }
        .btn-reset:hover {
            background: #c0392b;
        }
        .btn-cancel {
            background: #95a5a6;
            color: white;
        }
        .btn-cancel:hover {
            background: #7f8c8d;
        }
        .success {
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .icon {
            font-size: 64px;
            color: #e74c3c;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>លុបទិន្នន័យទាំងអស់</h1>
        <p>តើអ្នកពិតជាចង់លុបទិន្នន័យទាំងអស់មែនទេ? (ទំនិញ, ការលក់, អ្នកប្រើប្រាស់)</p>
        
        <button class="btn btn-reset" onclick="resetAllData()">
            ✓ បាទ/ចាស លុបទិន្នន័យ
        </button>
        <button class="btn btn-cancel" onclick="window.location.href='index.html'">
          ✗ ទេ បោះបង់
        </button>
        
        <div class="success" id="successMsg">
            ✓ ទិន្នន័យត្រូវបានលុបជោគជ័យ! <br>
            <a href="index.html" style="color: white; margin-top: 10px; display: inline-block;">ចុចទីនេះដើម្បីចាប់ផ្តើមថ្មី</a>
        </div>
    </div>

    <script>
        function resetAllData() {
            if (confirm('តើអ្នកពិតជាចង់លុបទិន្នន័យទាំងអស់មែនទេ?')) {
                // Clear all data
                localStorage.removeItem('coffeePOSData');
                localStorage.removeItem('coffeePOSUser');
                
                // Show success message
                document.getElementById('successMsg').style.display = 'block';
                document.querySelector('.icon').style.display = 'none';
                document.querySelector('h1').textContent = '✓ ជោគជ័យ!';
                document.querySelector('p').textContent = 'ទិន្នន័យទាំងអស់ត្រូវបានលុប។';
                document.querySelector('.btn-reset').style.display = 'none';
                document.querySelector('.btn-cancel').style.display = 'none';
            }
        }
    </script>
</body>
</html>
